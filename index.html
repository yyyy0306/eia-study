<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>环评考试重难点浓缩手册</title>
  <link rel="stylesheet" href="styles.css?v=20260511-103">
</head>
<body>
  <div class="app" data-theme="light">
    <header class="topbar">
      <div class="shell topbar-inner">
        <div>
          <p class="eyebrow">EIA HIGH-YIELD NOTES</p>
          <h1>环评考试重难点浓缩手册</h1>
          <p class="subhead">按章节整理核心框架、易错辨析、案例答题句式和考前速记。少刷题，多看能提分的浓缩资料。</p>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="themeBtn" title="切换深浅色">◐</button>
          <button class="btn" id="printBtn">打印资料</button>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="dashboard notes-dashboard">
        <div class="search-panel">
          <label for="searchInput">搜索章节 / 重难点 / 易错词</label>
          <div class="search-grid notes-search">
            <input id="searchInput" type="search" placeholder="例如：依托工程、地下水、公众参与、非正常工况、达标分析">
            <select id="subjectSelect"></select>
          </div>
          <nav class="tabs" id="tabs">
            <button class="tab active" data-view="manual">重难点手册</button>
            <button class="tab" data-view="quick">考前速记</button>
            <button class="tab" data-view="index">关键词索引</button>
          </nav>
        </div>
        <aside class="stats compact-stats">
          <div><strong id="sectionCount">0</strong><span>章节</span></div>
          <div><strong id="pointCount">0</strong><span>重难点</span></div>
          <div><strong id="visibleCount">0</strong><span>当前显示</span></div>
          <div><strong id="quickCount">0</strong><span>速记句</span></div>
        </aside>
      </section>

      <section class="intel notes-intel">
        <div class="intel-card"><h2>答题总框架</h2><ol><li>先判断程序和文件类型</li><li>再核工程分析和评价范围</li><li>再看因子、现状、预测是否支撑结论</li><li>最后看措施、风险、监测、验收是否闭环</li></ol></div>
        <div class="intel-card"><h2>高频易错词</h2><div class="word-cloud" id="wordCloud"></div></div>
        <div class="intel-card"><h2>考前最该背</h2><ol id="todayPlan"></ol></div>
      </section>

      <section class="view active" id="manualView">
        <div class="chapter-layout">
          <aside class="chapter-nav" id="chapterNav"></aside>
          <article class="chapter-main" id="chapterMain"></article>
        </div>
      </section>

      <section class="view" id="quickView">
        <div class="manual-card"><h2>考前速记清单</h2><div class="quick-list" id="quickList"></div></div>
      </section>

      <section class="view" id="indexView">
        <div class="manual-card"><h2>关键词索引</h2><div class="index-list" id="indexList"></div></div>
      </section>
    </main>

    <nav class="bottom-nav" id="bottomNav" aria-label="手机底部导航">
      <button data-view="manual"><span>▦</span><b>手册</b></button>
      <button data-view="quick"><span>◆</span><b>速记</b></button>
      <button data-view="index"><span>⌕</span><b>索引</b></button>
    </nav>
  </div>
  <script src="notes.js?v=20260511-103"></script>
  <script src="app.js?v=20260511-103"></script>
</body>
</html>
